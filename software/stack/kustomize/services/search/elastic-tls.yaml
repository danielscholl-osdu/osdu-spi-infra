apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
spec:
  template:
    spec:
      initContainers:
        - name: import-elastic-ca
          image: eclipse-temurin:17-jre-alpine
          command:
            - sh
            - -c
            - |
              cp $JAVA_HOME/lib/security/cacerts /truststore/cacerts
              keytool -importcert -noprompt -keystore /truststore/cacerts \
                -storepass changeit -alias elastic-ca -file /elastic-ca/ca.crt
          volumeMounts:
            - name: elastic-ca
              mountPath: /elastic-ca
              readOnly: true
            - name: truststore
              mountPath: /truststore
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      containers:
        - name: search
          env:
            - name: JAVA_TOOL_OPTIONS
              value: -Djavax.net.ssl.trustStore=/truststore/cacerts -Djavax.net.ssl.trustStorePassword=changeit
          volumeMounts:
            - name: truststore
              mountPath: /truststore
              readOnly: true
      volumes:
        - name: elastic-ca
          secret:
            secretName: elastic-ca-cert
        - name: truststore
          emptyDir: {}

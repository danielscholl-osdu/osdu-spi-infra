# -- Image configuration
image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

# -- Container port the service listens on
containerPort: 8080

# -- Service account (created by osdu-common module)
serviceAccountName: workload-identity-sa

# -- ConfigMap mounted as envFrom (created by osdu-common module)
configMapRef: osdu-config

# -- Kubernetes Service
service:
  type: ClusterIP
  port: 80

# -- Health probes
probes:
  liveness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 250
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# -- Resource requests and limits
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# -- Extra environment variables (list of {name, value} objects)
env: []
# - name: FOO
#   value: bar

# -- Extra init containers (for data download, etc.)
initContainers: []

# -- Extra volume mounts for the main container
volumeMounts: []

# -- Extra volumes
volumes: []

# -- Workload identity pod label
workloadIdentity: true

# -- Elasticsearch TLS init container (for search/indexer)
elasticTls: false

# -- Topology spread constraints
topologySpread: true

# -- Pin Istio sidecar proxy image
istioProxyPin:
  enabled: false
  image: mcr.microsoft.com/oss/v2/istio/proxyv2:v1.28.3-2

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            nodeSelector:
              agentpool: __NODEPOOL_NAME__
            tolerations:
              - key: workload
                operator: Equal
                value: "__NODEPOOL_NAME__"
                effect: NoSchedule
  - target:
      kind: StatefulSet
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            nodeSelector:
              agentpool: __NODEPOOL_NAME__
            tolerations:
              - key: workload
                operator: Equal
                value: "__NODEPOOL_NAME__"
                effect: NoSchedule
  - target:
      kind: Job
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            nodeSelector:
              agentpool: __NODEPOOL_NAME__
            tolerations:
              - key: workload
                operator: Equal
                value: "__NODEPOOL_NAME__"
                effect: NoSchedule
  - target:
      kind: CronJob
    patch: |-
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: placeholder
      spec:
        jobTemplate:
          spec:
            template:
              spec:
                nodeSelector:
                  agentpool: __NODEPOOL_NAME__
                tolerations:
                  - key: workload
                    operator: Equal
                    value: "__NODEPOOL_NAME__"
                    effect: NoSchedule

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - all.yaml

components:
  - ../../components/seccomp
  - ../../components/security-context
  - ../../components/topology-spread

patches:
  - path: probes.yaml
    target:
      kind: Deployment
      labelSelector: "type=core"
  - path: resources.yaml
    target:
      kind: Deployment
  - path: resources.yaml
    target:
      kind: StatefulSet
  # Move secret-admin Role/RoleBinding into the release namespace instead of
  # the chart's default {release-ns}-secret-admin separate namespace.
  # __RELEASE_NAMESPACE__ is replaced by postrender.sh at apply time.
  - patch: |
      - op: replace
        path: /metadata/namespace
        value: __RELEASE_NAMESPACE__
    target:
      kind: Role
      name: secret-admin
  - patch: |
      - op: replace
        path: /metadata/namespace
        value: __RELEASE_NAMESPACE__
    target:
      kind: RoleBinding
      name: secret-admin

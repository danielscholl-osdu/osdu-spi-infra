name: Dependabot Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  validate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.12"

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect changed directories
        id: detect
        run: |
          DIRS=""
          git diff --name-only origin/main...HEAD | while read -r file; do
            case "$file" in
              infra/*) echo "infra" ;;
              infra-access/*) echo "infra-access" ;;
              software/foundation/*) echo "software/foundation" ;;
              software/stack/*) echo "software/stack" ;;
            esac
          done | sort -u > /tmp/tf-dirs.txt

          echo "Terraform directories changed:"
          cat /tmp/tf-dirs.txt

          echo "tf_dirs=$(paste -sd ',' /tmp/tf-dirs.txt)" >> "$GITHUB_OUTPUT"
          echo "has_tf=$([ -s /tmp/tf-dirs.txt ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "has_docs=$(git diff --name-only origin/main...HEAD | grep -q '^docs/' && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Terraform Format Check
        if: steps.detect.outputs.has_tf == 'true'
        run: terraform fmt -check -recursive -diff

      - name: Terraform Validate
        if: steps.detect.outputs.has_tf == 'true'
        run: |
          IFS=',' read -ra DIRS <<< "${{ steps.detect.outputs.tf_dirs }}"
          FAILED=0
          for dir in "${DIRS[@]}"; do
            if [ -z "$dir" ]; then continue; fi
            echo "::group::Validating $dir"
            cd "$dir"
            terraform init -backend=false
            if ! terraform validate; then
              FAILED=1
              echo "::error::Terraform validate failed for $dir"
            fi
            cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
          exit $FAILED

      - name: Docs Build Check
        if: steps.detect.outputs.has_docs == 'true'
        working-directory: docs
        run: |
          npm ci
          npm run build

  create-failure-issue:
    needs: validate
    if: ${{ always() && needs.validate.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for failed dependency update
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prUrl = context.payload.pull_request.html_url;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `Dependabot validation failed: ${prTitle}`;
            const body = [
              `## Dependency Update Validation Failed`,
              ``,
              `**Pull Request:** #${prNumber} — ${prTitle}`,
              `**PR Link:** ${prUrl}`,
              `**Build Log:** ${runUrl}`,
              ``,
              `### What happened`,
              ``,
              `A Dependabot dependency update failed validation checks.`,
              `This likely means the new version introduces a breaking change.`,
              ``,
              `### Next steps`,
              ``,
              `1. Review the [build log](${runUrl}) for specific errors`,
              `2. Check the provider/package changelog for breaking changes`,
              `3. Update Terraform code to be compatible, or pin to the previous version`,
              `4. If pinning, add a comment in \`versions.tf\` explaining why`,
              ``,
              `### Checklist`,
              ``,
              `- [ ] Root cause identified`,
              `- [ ] Fix applied or version pinned`,
              `- [ ] PR merged or closed`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['build-failed', 'dependencies', 'human-required'],
            });

name: Validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      infra-access: ${{ steps.filter.outputs.infra-access }}
      foundation: ${{ steps.filter.outputs.foundation }}
      stack: ${{ steps.filter.outputs.stack }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
            infra-access:
              - 'infra-access/**'
            foundation:
              - 'software/foundation/**'
            spi-stack:
              - 'software/spi-stack/**'
            cimpl-stack:
              - 'software/cimpl-stack/**'

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.12"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: infra
            path: infra
            changed: ${{ needs.detect-changes.outputs.infra }}
          - name: infra-access
            path: infra-access
            changed: ${{ needs.detect-changes.outputs.infra-access }}
          - name: foundation
            path: software/foundation
            changed: ${{ needs.detect-changes.outputs.foundation }}
          - name: spi-stack
            path: software/spi-stack
            changed: ${{ needs.detect-changes.outputs.spi-stack }}
          - name: cimpl-stack
            path: software/cimpl-stack
            changed: ${{ needs.detect-changes.outputs.cimpl-stack }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ matrix.changed == 'true' }}

      - uses: hashicorp/setup-terraform@v4
        if: ${{ matrix.changed == 'true' }}
        with:
          terraform_version: "~> 1.12"

      - name: Terraform Init (${{ matrix.name }})
        if: ${{ matrix.changed == 'true' }}
        working-directory: ${{ matrix.path }}
        run: terraform init -backend=false

      - name: Terraform Validate (${{ matrix.name }})
        if: ${{ matrix.changed == 'true' }}
        working-directory: ${{ matrix.path }}
        run: terraform validate

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

  summary:
    if: always()
    needs: [terraform-fmt, terraform-validate, docs-build]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.terraform-fmt.result }}" == "failure" ]] || \
             [[ "${{ needs.terraform-validate.result }}" == "failure" ]] || \
             [[ "${{ needs.docs-build.result }}" == "failure" ]]; then
            echo "::error::One or more validation checks failed"
            exit 1
          fi
          echo "All validation checks passed"

  create-failure-issue:
    needs: summary
    if: ${{ always() && needs.summary.result == 'failure' && github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create issue for failed dependency update
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prUrl = context.payload.pull_request.html_url;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `Dependabot validation failed: ${prTitle}`;
            const body = [
              `## Dependency Update Validation Failed`,
              ``,
              `**Pull Request:** #${prNumber} — ${prTitle}`,
              `**PR Link:** ${prUrl}`,
              `**Build Log:** ${runUrl}`,
              ``,
              `### What happened`,
              ``,
              `A Dependabot dependency update failed validation checks.`,
              `This likely means the new version introduces a breaking change.`,
              ``,
              `### Next steps`,
              ``,
              `1. Review the [build log](${runUrl}) for specific errors`,
              `2. Check the provider/package changelog for breaking changes`,
              `3. Update Terraform code to be compatible, or pin to the previous version`,
              `4. If pinning, add a comment in \`versions.tf\` explaining why`,
              ``,
              `### Checklist`,
              ``,
              `- [ ] Root cause identified`,
              `- [ ] Fix applied or version pinned`,
              `- [ ] PR merged or closed`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['build-failed', 'dependencies', 'human-required'],
            });

version: 2

updates:
  # ── Terraform Providers ─────────────────────────────────────────────
  # Each Terraform root has its own lock file, so each needs a separate entry.

  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    groups:
      azure-providers:
        patterns:
          - "hashicorp/azurerm"
          - "azure/azapi"
      hashicorp-utilities:
        patterns:
          - "hashicorp/random"
          - "hashicorp/null"

  - package-ecosystem: "terraform"
    directory: "/infra-access"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      azure-providers:
        patterns:
          - "hashicorp/azurerm"
          - "azure/azapi"

  - package-ecosystem: "terraform"
    directory: "/software/foundation"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      helm-providers:
        patterns:
          - "hashicorp/helm"
          - "hashicorp/kubernetes"
          - "gavinbunney/kubectl"

  - package-ecosystem: "terraform"
    directory: "/software/spi-stack"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    groups:
      helm-providers:
        patterns:
          - "hashicorp/helm"
          - "hashicorp/kubernetes"
          - "gavinbunney/kubectl"
      hashicorp-utilities:
        patterns:
          - "hashicorp/null"
          - "hashicorp/time"
          - "hashicorp/random"

  # ── npm (documentation site) ────────────────────────────────────────

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    groups:
      starlight:
        patterns:
          - "@astrojs/*"
          - "astro"
          - "starlight-*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 3

  # ── GitHub Actions ──────────────────────────────────────────────────

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    open-pull-requests-limit: 5
